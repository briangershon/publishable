name: Publish to NPM

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Publish to NPM
        run: npm publish

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # This gets the full history for parsing commits

      - name: Get previous tag
        id: prevtag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Get current tag
        id: curtag
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "Current tag: $CURRENT_TAG"

      - name: Extract commit messages
        id: commits
        run: |
          if [ -z "${{ steps.prevtag.outputs.PREV_TAG }}" ]; then
            COMMITS=$(git log --pretty=format:"%h - %s" ${{ steps.curtag.outputs.CURRENT_TAG }})
          else
            COMMITS=$(git log --pretty=format:"%h - %s" ${{ steps.prevtag.outputs.PREV_TAG }}..${{ steps.curtag.outputs.CURRENT_TAG }})
          fi
          echo "$COMMITS" > commits.txt
          echo "Commit log created"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate release notes
        id: notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python .github/scripts/generate_notes.py

          RELEASE_NOTES=$(cat release_notes.md)
          echo "release_notes<<DELIMITER" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "DELIMITER" >> $GITHUB_OUTPUT

          RELEASE_TITLE=$(cat release_title.txt)
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.curtag.outputs.CURRENT_TAG }} - ${{ steps.notes.outputs.release_title }}"
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
