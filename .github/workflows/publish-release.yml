name: Auto-Release with AI Summaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This gets the full history for parsing commits

      - name: Get previous tag
        id: prevtag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: $PREV_TAG"

      - name: Get current tag
        id: curtag
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "Current tag: $CURRENT_TAG"

      - name: Extract commit messages
        id: commits
        run: |
          if [ -z "${{ steps.prevtag.outputs.PREV_TAG }}" ]; then
            COMMITS=$(git log --pretty=format:"%h - %s" ${{ steps.curtag.outputs.CURRENT_TAG }})
          else
            COMMITS=$(git log --pretty=format:"%h - %s" ${{ steps.prevtag.outputs.PREV_TAG }}..${{ steps.curtag.outputs.CURRENT_TAG }})
          fi
          echo "$COMMITS" > commits.txt
          echo "Commit log created"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Generate release notes
        id: notes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python .github/scripts/generate_notes.py

          RELEASE_NOTES=$(cat release_notes.md)
          echo "release_notes<<DELIMITER" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "DELIMITER" >> $GITHUB_OUTPUT

          RELEASE_TITLE=$(cat release_title.txt)
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: '${{ steps.curtag.outputs.CURRENT_TAG }} - ${{ steps.notes.outputs.release_title }}'
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
